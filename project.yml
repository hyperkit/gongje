name: gongje
options:
  developmentLanguage: en
  bundleIdPrefix: com.akito
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  knownRegions:
    - en
    - zh-Hant-TW
    - zh-Hant-HK

configs:
  Debug: debug
  Debug-AppStore: debug
  Release: release
  AppStore: release

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.12.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.2.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: "2.30.0"

schemes:
  gongje:
    build:
      targets:
        gongje: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  gongje-AppStore:
    build:
      targets:
        gongje: all
    run:
      config: Debug-AppStore
    test:
      config: Debug-AppStore
    profile:
      config: AppStore
    analyze:
      config: Debug-AppStore
    archive:
      config: AppStore

targets:
  gongje:
    type: application
    platform: macOS
    sources:
      - gongje
    dependencies:
      - package: WhisperKit
      - package: KeyboardShortcuts
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
    configFiles:
      Debug: Local.xcconfig
      Debug-AppStore: Local.xcconfig
      Release: Local.xcconfig
      AppStore: Local.xcconfig
    settings:
      base:
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "4"
        INFOPLIST_FILE: gongje/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: gongje/Resources/gongje.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: false
      configs:
        Debug-AppStore:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
          INFOPLIST_FILE: gongje/Resources/Info-AppStore.plist
          CODE_SIGN_ENTITLEMENTS: gongje/Resources/gongje-AppStore.entitlements
        AppStore:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: APPSTORE
          INFOPLIST_FILE: gongje/Resources/Info-AppStore.plist
          CODE_SIGN_ENTITLEMENTS: gongje/Resources/gongje-AppStore.entitlements
          ENABLE_HARDENED_RUNTIME: true

  gongjeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - gongjeTests
    dependencies:
      - target: gongje
    settings:
      base:
        SWIFT_VERSION: "5.9"
